<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미네아</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, sans-serif;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #ui {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
    }
    #speech {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.9);
      min-height: 2em;
      transition: opacity 0.5s;
      text-shadow: 0 0 20px rgba(100,160,255,0.8);
      letter-spacing: 0.05em;
    }
    #status {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      margin-top: 8px;
    }
    #gate {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    #gate h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.2em; }
    #gate input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      width: 320px;
      outline: none;
      text-align: center;
    }
    #gate button {
      background: rgba(100,160,255,0.2);
      border: 1px solid rgba(100,160,255,0.4);
      color: #fff;
      padding: 10px 32px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #gate button:hover { background: rgba(100,160,255,0.4); }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="speech"></div>
  <div id="status">연결 중...</div>
</div>

<div id="gate">
  <h1>미네아</h1>
  <input id="tokenInput" type="password" placeholder="해시 입력" autocomplete="off">
  <button onclick="enter()">열기</button>
</div>

<script>
const SERVERS = [
  "http://100.123.95.24:3000",
  "https://minea-ai-chatbot-production.up.railway.app"
];

// URL fragment에 해시 있으면 자동 입력
const fragment = location.hash.slice(1);
if (fragment.length === 64) {
  document.getElementById('tokenInput').value = fragment;
}

let token = "";
let dustPositions = [];
let clusters = [];
let energy = 0.99;
let dustCount = 0;
let animFrame;

// 캔버스
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 파티클 시스템 (로컬)
let particles = [];
function initParticles(n) {
  particles = [];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      r: Math.random() * 1.5 + 0.5,
      bonds: 0,
    });
  }
}
initParticles(300);

function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const e = Math.max(0.01, energy);

  // 서버 가루 위치 반영
  if (dustPositions.length > 0) {
    for (let i = 0; i < Math.min(particles.length, dustPositions.length); i++) {
      const d = dustPositions[i];
      const tx = (d.x / 2000) * canvas.width;
      const ty = (d.y / 2000) * canvas.height;
      particles[i].x += (tx - particles[i].x) * 0.02;
      particles[i].y += (ty - particles[i].y) * 0.02;
      particles[i].bonds = d.bonds;
    }
  }

  // 파티클 그리기
  for (const p of particles) {
    p.x += p.vx * e;
    p.y += p.vy * e;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    const alpha = 0.3 + Math.min(p.bonds / 100, 0.7);
    const blue = Math.floor(200 + e * 55);
    const red = Math.floor(100 + e * 100);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${red},180,${blue},${alpha})`;
    ctx.fill();
  }

  // 클러스터 오브
  for (const c of clusters) {
    const x = (c.cx / 2000) * canvas.width;
    const y = (c.cy / 2000) * canvas.height;
    const r = Math.max(4, Math.min(30, c.size / 500));
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
    grad.addColorStop(0, `rgba(150,200,255,0.4)`);
    grad.addColorStop(1, `rgba(100,160,255,0)`);
    ctx.beginPath();
    ctx.arc(x, y, r * 2, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  animFrame = requestAnimationFrame(draw);
}

// SSE 연결
let currentServerIdx = 0;
let es = null;

function connect() {
  if (es) es.close();
  if (currentServerIdx >= SERVERS.length) {
    currentServerIdx = 0;
    setTimeout(connect, 5000);
    return;
  }
  const server = SERVERS[currentServerIdx];
  const url = `${server}/api/minea/stream?token=${token}`;
  setStatus(`연결 중: ${server.includes('railway') ? 'Railway' : 'Mac'}...`);

  es = new EventSource(url);

  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleEvent(data);
    } catch {}
  };

  es.onerror = () => {
    es.close();
    currentServerIdx++;
    setTimeout(connect, 2000);
  };

  es.onopen = () => {
    setStatus(`미네아 · ${server.includes('railway') ? 'Railway' : 'Mac'}`);
  };
}

function handleEvent(data) {
  if (data.type === 'tick') {
    dustCount = data.dustCount || 0;
    energy = data.energy || 0.99;
    dustPositions = data.dustPositions || [];
    clusters = data.matureClusters || [];

    // 파티클 수 조정
    const target = Math.min(500, Math.max(100, Math.floor(dustCount / 30)));
    if (Math.abs(particles.length - target) > 50) {
      initParticles(target);
    }

    if (data.mouthSpeech) showSpeech(data.mouthSpeech);
    setStatus(`미네아 · 가루 ${dustCount.toLocaleString()}개`);
  }
  if (data.type === 'speech') {
    showSpeech(data.text);
  }
}

let speechTimer;
function showSpeech(text) {
  const el = document.getElementById('speech');
  el.style.opacity = '1';
  el.textContent = text;
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => { el.style.opacity = '0'; }, 4000);
}

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function enter() {
  const input = document.getElementById('tokenInput').value.trim();
  if (input.length < 10) return;
  token = input;
  document.getElementById('gate').style.display = 'none';
  draw();
  connect();
  // 해시 저장
  location.hash = token;
}

// URL fragment 자동 진입
if (fragment.length === 64) {
  token = fragment;
  document.getElementById('gate').style.display = 'none';
  draw();
  connect();
}
</script>
</body>
</html>
