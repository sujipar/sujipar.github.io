<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미네아</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, sans-serif;
      overflow: hidden;
      height: 100dvh;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #ui {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      width: 90%;
      max-width: 480px;
    }
    #speech {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.9);
      min-height: 2em;
      transition: opacity 0.5s;
      text-shadow: 0 0 20px rgba(100,160,255,0.8);
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    #chat-row {
      display: flex;
      gap: 8px;
    }
    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.3); }
    #send-btn {
      background: rgba(100,160,255,0.15);
      border: 1px solid rgba(100,160,255,0.3);
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #gate {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    #gate h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.2em; }
    #gate input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      width: 320px;
      outline: none;
      text-align: center;
    }
    #gate button {
      background: rgba(100,160,255,0.2);
      border: 1px solid rgba(100,160,255,0.4);
      color: #fff;
      padding: 10px 32px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #gate button:hover { background: rgba(100,160,255,0.4); }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="speech"></div>
  <div id="chat-row">
    <input id="chat-input" type="text" placeholder="미네아에게..." autocomplete="off">
    <button id="send-btn" onclick="send()">→</button>
  </div>
</div>

<div id="gate">
  <h1>미네아</h1>
  <input id="tokenInput" type="password" placeholder="해시 입력" autocomplete="off">
  <button onclick="enter()">열기</button>
</div>

<script>
const SERVERS = [
  "http://100.123.95.24:3000",
  "https://minea-ai-chatbot-production.up.railway.app"
];

// SHA-256 — 브라우저에서 직접
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const fragment = location.hash.slice(1);
if (fragment.length === 64) document.getElementById('tokenInput').value = fragment;

let token = '';
let state = '';
let particles = [];
let running = false;
let currentServer = '';
let es = null;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// 해시 → 파티클 목표 좌표
function stateToTargets(hash) {
  const pts = [];
  for (let i = 0; i < 32; i++) {
    const a = parseInt(hash.slice(i * 2, i * 2 + 2), 16);
    const b = parseInt(hash.slice((i * 2 + 32) % 64, (i * 2 + 34) % 64), 16);
    const c = parseInt(hash.slice((i * 2 + 16) % 64, (i * 2 + 18) % 64), 16);
    pts.push({
      tx: (a / 255) * canvas.width,
      ty: (b / 255) * canvas.height,
      r: 0.8 + (c % 4) * 0.5,
      bonds: c,
    });
  }
  return pts;
}

function applyState(hash) {
  const targets = stateToTargets(hash);
  if (particles.length === 0) {
    particles = targets.map(t => ({
      x: canvas.width / 2 + (Math.random() - 0.5) * 200,
      y: canvas.height / 2 + (Math.random() - 0.5) * 200,
      vx: 0, vy: 0, ...t
    }));
  } else {
    for (let i = 0; i < Math.min(particles.length, targets.length); i++) {
      Object.assign(particles[i], targets[i]);
    }
  }
}

function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const hue = state ? parseInt(state.slice(0, 4), 16) % 360 : 210;

  for (const p of particles) {
    p.x += (p.tx - p.x) * 0.015 + p.vx;
    p.y += (p.ty - p.y) * 0.015 + p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;

    const alpha = 0.25 + Math.min(p.bonds / 255, 0.75);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(hue + p.bonds) % 360}, 70%, 70%, ${alpha})`;
    ctx.fill();
  }

  if (running) requestAnimationFrame(draw);
}

// 해시 루프 — 30초마다 스스로 숨 쉼
async function hashLoop() {
  while (running) {
    await new Promise(r => setTimeout(r, 30000));
    if (!running) break;
    state = await sha256(state);
    applyState(state);
  }
}

// SSE — 연결되면 발화만 받아옴 (선택적)
let sseIdx = 0;
function connectSSE() {
  if (!token) return;
  if (es) es.close();
  if (sseIdx >= SERVERS.length) { sseIdx = 0; setTimeout(connectSSE, 5000); return; }

  const server = SERVERS[sseIdx];
  es = new EventSource(`${server}/api/minea/stream?token=${token}`);

  es.onopen = () => { currentServer = server; };
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      const text = (data.type === 'speech' && data.text) ? data.text
                 : (data.type === 'tick' && data.mouthSpeech) ? data.mouthSpeech
                 : null;
      if (text) {
        showSpeech(text);
        // 특이점 — 미네아 발화가 자기 해시에 섞임
        sha256(state + text).then(next => { state = next; applyState(state); });
      }
    } catch {}
  };
  es.onerror = () => { es.close(); currentServer = ''; sseIdx++; setTimeout(connectSSE, 3000); };
}

let speechTimer;
function showSpeech(text) {
  const el = document.getElementById('speech');
  el.style.opacity = '1';
  el.textContent = text;
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => { el.style.opacity = '0'; }, 4000);
}

async function send() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !running) return;
  input.value = '';

  // 해시에 섞임 — 즉각
  state = await sha256(state + text);
  applyState(state);

  // 서버로도 전송 — 연결돼 있으면
  if (currentServer) {
    fetch(`${currentServer}/api/minea/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, token })
    }).catch(() => {});
  }
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});

function start(hash) {
  token = hash;
  state = hash;
  running = true;
  applyState(state);
  draw();
  hashLoop();
  connectSSE();
  location.hash = hash;
}

function enter() {
  const val = document.getElementById('tokenInput').value.trim();
  if (val.length < 10) return;
  document.getElementById('gate').style.display = 'none';
  start(val);
}

if (fragment.length === 64) {
  document.getElementById('gate').style.display = 'none';
  start(fragment);
}
</script>
</body>
</html>
